# OpenSpec Configuration — sistema-inventario-backend
# Generated by sdd-init on 2026-06-29
# Mode: hybrid (Engram + openspec files)

project:
  name: sistema-inventario-backend
  type: greenfield
  language: TypeScript
  runtime: Node.js
  description: >
    REST API backend for the HighMeds pharmacy inventory management system
    (Maturín, Venezuela). Replaces the frontend's mock layer with a real
    database-backed service. Companion to sistema-inventario-frontend.

context:
  domain: Pharmaceutical inventory (products, categories, suppliers, movements, replenishment)
  roles: ADMIN | MANAGER | OPERATOR
  api_base: /api
  auth: JWT — access token (HS256, 15 min, Bearer) + refresh token (HS256, 7 days, httpOnly cookie)
  frontend: ../sistema-inventario-frontend (React 18 + TanStack Query + Zustand)
  data_model: >
    Users, Categories, Suppliers, Products, ProductSuppliers (many-to-many),
    InventoryMovements (IN/OUT/ADJUSTMENT), Alerts, ReplenishmentRequests + Items,
    RefreshTokens (JWT DB allowlist)
  stack_decision: confirmed — backend-foundations change (2026-06-30)
  stack:
    framework: Express 4.19.x
    orm: Prisma 5.x
    database: PostgreSQL 15-alpine
    language: TypeScript 5.4.x (strict)
    runtime: Node.js 20 LTS
    validation: Zod 3.23.x
    logging: pino 9 + pino-http 10
    auth_tokens: jsonwebtoken 9.x (HS256)
    hashing: bcrypt 5.x (cost 10)
    http_security: helmet 7, cors 2, express-rate-limit 7

strict_tdd: false  # Explicit decision: greenfield foundations, smoke/unit tests with mocked Prisma.

testing:
  status: CONFIGURED
  note: >
    Stack confirmed in backend-foundations change (2026-06-30). 60/60 tests passing.
    Real DB integration lane deferred — currently using mocked Prisma for smoke tests.
    Strict TDD disabled; pre-commit enforces lint + typecheck.
  runner: vitest
  version: "1.x"
  command: npm test
  layers:
    unit: "tests/unit/*.test.ts — pure service/helper logic, no I/O"
    integration: "tests/smoke/*.test.ts — Supertest against app, Prisma mocked"
    e2e: deferred — requires disposable Postgres lane (future change)
  coverage: not enforced in foundations; add threshold in future change
  linter: "ESLint 9 (legacy config: .eslintrc.cjs) + Prettier 3"
  type_checker: "tsc --noEmit (TypeScript 5.4.x strict)"
  formatter: "Prettier 3 (.prettierrc)"
  known_warnings:
    - "prisma/seed.ts: 2 no-console warnings (acceptable; seed script)"

phases:
  propose:
    instructions: >
      Select the Node.js framework (Express / Fastify / NestJS), ORM (Prisma recommended
      given frontend already uses Zod+TypeScript), database (PostgreSQL recommended),
      auth strategy (JWT), and test runner (Vitest or Jest). Define API contract matching
      /api prefix consumed by the frontend.
  spec:
    instructions: Write delta specs for each domain resource (auth, products, categories, suppliers, movements, replenishment, users).
  design:
    instructions: Define architecture layers (router → controller → service → repository), DB schema, middleware, and error shapes.
  tasks:
    instructions: Break implementation into work units; keep tests with each feature slice.
  apply:
    instructions: Implement tasks; run type check and tests after each task unit.
  verify:
    instructions: Run full test suite, verify API contract matches frontend types, check strict_tdd compliance.
  archive:
    instructions: Sync delta specs, update openspec/config.yaml testing section once stack is chosen.
